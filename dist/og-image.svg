<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Radar circles -->
  <g opacity="0.3" fill="none" stroke="#60a5fa" stroke-width="2">
    <circle cx="200" cy="315" r="80"/>
    <circle cx="200" cy="315" r="150"/>
    <circle cx="200" cy="315" r="220"/>
    <circle cx="200" cy="315" r="290"/>
  </g>

  <!-- Radar sweep line -->
  <g transform="translate(200, 315)">
    <line x1="0" y1="0" x2="250" y2="0" stroke="#60a5fa" stroke-width="3" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Radar center dot -->
  <circle cx="200" cy="315" r="8" fill="#60a5fa"/>

  <!-- Text content -->
  <text x="450" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white">
    Global Earnings Radar
  </text>

  <text x="450" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">
    Tech Stock Earnings Research
  </text>

  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#e2e8f0">
    <text x="450" y="320">📊 Earnings Summaries</text>
    <text x="450" y="360">💡 Business Insights</text>
    <text x="450" y="400">⚠️ Risk Factors</text>
    <text x="450" y="440">🔍 Research Questions</text>
  </g>

  <!-- Companies -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b">
    <text x="450" y="510">NVDA • MSFT • AAPL • GOOGL • AMZN • META • ASML • SAP</text>
  </g>

  <!-- Disclaimer -->
  <text x="450" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b">
    Educational Content Only • Not Investment Advice
  </text>

  <!-- Warning icon -->
  <g transform="translate(1050, 80)">
    <circle r="40" fill="#f59e0b"/>
    <text x="0" y="15" text-anchor="middle" font-size="48" font-weight="700" fill="white">!</text>
  </g>
  <text x="1050" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">EDUCATIONAL</text>
</svg>